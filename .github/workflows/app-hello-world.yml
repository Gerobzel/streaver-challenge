name: App / hello-world

on:
  push:
    branches: [main]
    paths:
      - "apps/hello-world/**"
  pull_request:
    paths:
      - "apps/hello-world/**"

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: "us-east-1"

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run unit tests
        working-directory: apps/hello-world
        run: PYTHONPATH=src python3 -m unittest discover -s tests -v

      - name: Build Docker image
        working-directory: apps/hello-world
        run: docker build -t hello-world:${{ github.sha }} .

  push:
    name: Push to ECR
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    outputs:
      image_tag: ${{ github.sha }}
      ecr_registry: ${{ steps.login-ecr.outputs.registry }}
    steps:
      - uses: actions/checkout@v4

      - name: Load pipeline env
        run: grep -v '^#' pipeline.env >> $GITHUB_ENV

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        working-directory: apps/hello-world
        run: |
          docker build \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

  deploy:
    name: Deploy (CodeDeploy canary)
    runs-on: ubuntu-latest
    needs: push
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Load pipeline env
        run: grep -v '^#' pipeline.env >> $GITHUB_ENV

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Register new task definition with updated image
        id: register-task-def
        env:
          ECR_REGISTRY: ${{ needs.push.outputs.ecr_registry }}
          IMAGE_TAG: ${{ needs.push.outputs.image_tag }}
        run: |
          NEW_IMAGE="$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"

          # Fetch current task definition and swap the container image
          NEW_TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition "$TASK_DEFINITION_FAMILY" \
            --query taskDefinition \
            --output json | jq \
              --arg IMAGE "$NEW_IMAGE" \
              '.containerDefinitions[0].image = $IMAGE
               | del(.taskDefinitionArn, .revision, .status,
                     .requiresAttributes, .placementConstraints,
                     .compatibilities, .registeredAt, .registeredBy)')

          TASK_DEF_ARN=$(aws ecs register-task-definition \
            --cli-input-json "$NEW_TASK_DEF" \
            --query taskDefinition.taskDefinitionArn \
            --output text)

          echo "task_def_arn=$TASK_DEF_ARN" >> $GITHUB_OUTPUT

      - name: Create CodeDeploy deployment
        id: deploy
        run: |
          APPSPEC=$(jq -c -n \
            --arg task_def "${{ steps.register-task-def.outputs.task_def_arn }}" \
            --arg container "$CONTAINER_NAME" \
            --argjson port "$CONTAINER_PORT" \
            '{version: 0.0, Resources: [{TargetService: {Type: "AWS::ECS::Service", Properties: {TaskDefinition: $task_def, LoadBalancerInfo: {ContainerName: $container, ContainerPort: $port}}}}]}')

          REVISION=$(jq -n --arg content "$APPSPEC" \
            '{revisionType: "AppSpecContent", appSpecContent: {content: $content}}')

          DEPLOYMENT_ID=$(aws deploy create-deployment \
            --application-name "$CODEDEPLOY_APP" \
            --deployment-group-name "$CODEDEPLOY_GROUP" \
            --revision "$REVISION" \
            --region "$AWS_REGION" \
            --query deploymentId \
            --output text)

          echo "deployment_id=$DEPLOYMENT_ID" >> $GITHUB_OUTPUT
          echo "## CodeDeploy deployment started" >> $GITHUB_STEP_SUMMARY
          echo "Deployment ID: \`$DEPLOYMENT_ID\`" >> $GITHUB_STEP_SUMMARY
          echo "Strategy: \`CodeDeployDefault.ECSCanary10Percent5Minutes\`" >> $GITHUB_STEP_SUMMARY
          echo "Image: \`${{ needs.push.outputs.image_tag }}\`" >> $GITHUB_STEP_SUMMARY

      - name: Wait for deployment to complete
        run: |
          aws deploy wait deployment-successful \
            --deployment-id "${{ steps.deploy.outputs.deployment_id }}" \
            --region "$AWS_REGION"

  ci-passed:
    name: CI Passed
    runs-on: ubuntu-latest
    needs: [build]
    if: always()
    steps:
      - run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]]; then
            exit 1
          fi
